<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKG Strip Verification — Tom's Review</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f4ef; --surface: #fff; --surface2: #fbfaf7;
  --border: #e4e0d6; --border-strong: #d4cfc2;
  --ink: #232020; --ink-soft: #4f4a43; --ink-mute: #847d71;
  --accent: #b5482e; --accent-deep: #9c3c25; --accent-soft: #f3e0d9;
  --teal: #2f6f6b; --teal-soft: #dcebe9;
  --correct: #2f7d4f; --correct-soft: #ddf0e2;
  --wrong: #b5482e; --wrong-soft: #f6e2dc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem 1rem 5rem; font-size: 16px; line-height: 1.5; }
.wrap { max-width: 820px; margin: 0 auto; }
.header { margin-bottom: 2rem; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); display: block; margin-bottom: 0.5rem; }
h1 { font-family: 'Fraunces', serif; font-size: 1.9rem; font-weight: 500; color: var(--ink); }
.sub { font-size: 14px; color: var(--ink-mute); margin-top: 6px; }
.strip-block { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.strip-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.strip-num { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-mute); }
.img-wrap { margin-bottom: 20px; text-align: center; }
.img-skeleton { width: 100%; height: 200px; border-radius: 8px; background: linear-gradient(90deg, var(--border) 25%, var(--surface2) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; display: flex; align-items: center; justify-content: center; }
.img-skeleton::after { content: 'Loading strip…'; color: var(--ink-mute); font-size: 13px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.strip-img { max-width: 100%; max-height: 220px; border-radius: 8px; border: 1px solid var(--border); display: none; transition: opacity 0.3s; }
.parts { display: flex; flex-direction: column; gap: 0; }
.part {
  border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  margin-bottom: 14px;
}
.part.hidden { display: none; }
.part.reveal {
  display: block;
  animation: slideRight 0.35s ease forwards;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}
.opt.shake { animation: shake 0.35s ease; }
@keyframes pulse-correct {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.02); }
  100% { transform: scale(1); }
}
.opt.correct { animation: pulse-correct 0.35s ease; }

/* Try again toast */
.try-again {
  text-align: center; font-size: 13px; font-weight: 600;
  color: var(--wrong); padding: 8px 0 2px;
  border-top: 1px solid var(--border);
  animation: fadeInUp 0.2s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Step dots */
.step-dots {
  display: flex; justify-content: center; gap: 8px; margin: 12px 0 4px;
}
.step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); border: 1.5px solid var(--border-strong);
  transition: background 0.3s, border-color 0.3s;
}
.step-dot.done { background: var(--correct); border-color: var(--correct); }
.step-dot.active { background: var(--accent); border-color: var(--accent); }
.part-stem { padding: 12px 16px; font-size: 15px; font-weight: 500; color: var(--ink); background: var(--surface2); border-bottom: 1px solid var(--border); }
.opts { display: flex; flex-direction: column; gap: 0; }
.opt { display: flex; align-items: flex-start; gap: 12px; padding: 11px 16px; cursor: pointer; background: var(--surface); border: none; border-bottom: 1px solid var(--border); text-align: left; width: 100%; font-family: 'DM Sans', sans-serif; transition: background 0.12s; }
.opt:last-child { border-bottom: 1px solid var(--border); }
.opt:hover:not([disabled]) { background: var(--accent-soft); }
.opt-letter { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-mute); min-width: 18px; font-weight: 600; }
.opt-text { font-size: 15px; color: var(--ink); }
.opt[disabled] { cursor: default; }
.opt.correct { background: var(--correct-soft); }
.opt.correct .opt-letter, .opt.correct .opt-text { color: var(--correct); font-weight: 600; }
.opt.wrong { background: var(--wrong-soft); }
.opt.wrong .opt-letter, .opt.wrong .opt-text { color: var(--wrong); }
.opt.dimmed { opacity: 0.4; }
.feedback {
  padding: 12px 16px; font-size: 14px; line-height: 1.6;
  border-top: 1px solid var(--border);
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s ease, opacity 0.3s ease;
  opacity: 0;
}
.feedback.show {
  max-height: 200px; opacity: 1; padding: 12px 16px;
}
.feedback.correct { background: var(--correct-soft); color: #1a4d30; }
.feedback.wrong   { background: var(--wrong-soft);   color: #7a2a18; }
.verdict { font-weight: 700; display: block; margin-bottom: 4px; }
.score-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 16px; position: sticky; top: 12px; z-index: 10; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.score-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-mute); }
.score-val { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: var(--teal); }
.track { flex: 1; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
.fill { height: 100%; width: 0%; background: var(--teal); border-radius: 4px; transition: width 0.3s; }
.next-btn {
  display: block; width: 100%; margin-top: 18px; padding: 14px;
  background: var(--accent); color: #fff; border: none; border-radius: 9px;
  font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
  animation: slideRight 0.35s ease forwards;
}
.next-btn:hover { background: var(--accent-deep); }
.strip-nav { display: flex; align-items: center; justify-content: space-between; width: 100%; }
.nav-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-mute);
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 10px; cursor: pointer; transition: all 0.15s;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.step-nav { display: flex; align-items: center; margin-top: 10px; min-height: 28px; }
.step-back-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-mute);
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 10px; cursor: pointer; transition: all 0.15s;
}
.step-back-btn:hover { border-color: var(--teal); color: var(--teal); }
</style>
</head>

        options: ['Completely chaotic — no discernible pattern of any kind', 'Regular', 'Regularly irregular', 'Irregularly irregular but with identifiable complexes'],
        correct: 0,
        rationale: 'Ventricular fibrillation has a completely chaotic baseline with no organized rhythm. This is a lethal dysrhythmia — the heart is not pumping.'
      },
      {
        stem: 'Are P waves present before every QRS?',
        options: ['No — no P waves, no QRS complexes, only chaotic electrical activity', 'Yes — upright P waves before each complex', 'Sawtooth flutter waves at a rapid rate', 'P waves visible but not followed by QRS complexes'],
        correct: 0,
        rationale: 'Ventricular fibrillation has no P waves, no QRS complexes, no T waves — only disorganized chaotic activity. There is no coordinated atrial or ventricular conduction.'
      },
      {
        stem: 'What does the QRS complex look like?',
        options: ['No identifiable QRS complexes — only chaotic waveforms', 'Narrow and normal at a fast rate', 'Wide and bizarre at a fast rate', 'Twisting around the baseline in a spindle pattern'],
        correct: 0,
        rationale: 'There are no identifiable QRS complexes in ventricular fibrillation. The chaotic waveforms represent disorganized electrical activity — no effective ventricular contraction occurs.'
      },
      {
        stem: 'Based on your analysis, what is this rhythm?',
        options: ['Ventricular Fibrillation — immediate unsynchronized defibrillation required', 'Asystole — CPR only, defibrillation not indicated', 'Ventricular Tachycardia — synchronized cardioversion', 'Atrial Fibrillation — rate control with IV beta blocker'],
        correct: 0,
        rationale: 'Chaotic baseline, no rate, no P waves, no QRS, pulseless — Ventricular Fibrillation. Immediate unsynchronized defibrillation. Every second without it reduces survival.'
      }
    ]
  }
];
// ── Engine ────────────────────────────────────────────────────────
const LETTERS = ['A','B','C','D'];
const TOTAL_QUESTIONS = STRIPS.reduce((sum, s) => sum + s.parts.length, 0);
let totalAnswered = 0, totalCorrect = 0;
let currentStrip = 0;
const currentPart = {};
const doneParts = {};

function updateScore() {
  document.getElementById('score-val').textContent = `${totalCorrect} / ${totalAnswered}`;
  const fillPct = Math.round((totalAnswered / TOTAL_QUESTIONS) * 100);
  const accPct = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  document.getElementById('score-pct').textContent = totalAnswered > 0 ? accPct + '%' : '—';
  document.getElementById('score-fill').style.width = fillPct + '%';
  document.getElementById('strip-counter').textContent = `Strip ${currentStrip + 1} / ${STRIPS.length}`;
}

function updateDots(si, activePi, donePis) {
  STRIPS[si].parts.forEach((_, pi) => {
    const dot = document.getElementById(`dot-${si}-${pi}`);
    if (!dot) return;
    dot.className = 'step-dot';
    if (donePis.includes(pi)) dot.classList.add('done');
    else if (pi === activePi) dot.classList.add('active');
  });
}

function swapParts(si, fromPi, toPi, direction) {
  const fromEl = document.getElementById(`part-${si}-${fromPi}`);
  const toEl   = document.getElementById(`part-${si}-${toPi}`);
  if (!fromEl || !toEl) return;
  const outX = direction === 'forward' ? '-50px' : '50px';
  const inX  = direction === 'forward' ? '50px'  : '-50px';
  fromEl.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
  fromEl.style.opacity = '0';
  fromEl.style.transform = `translateX(${outX})`;
  setTimeout(() => {
    fromEl.style.display = 'none';
    toEl.classList.remove('hidden');
    toEl.style.display = 'block';
    toEl.style.opacity = '0';
    toEl.style.transform = `translateX(${inX})`;
    toEl.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      toEl.style.opacity = '1';
      toEl.style.transform = 'translateX(0)';
    }));
  }, 220);
}

function goToPart(si, fromPi, toPi, direction) {
  if (toPi < 0 || toPi >= STRIPS[si].parts.length) return;
  currentPart[si] = toPi;
  swapParts(si, fromPi, toPi, direction);
  updateDots(si, toPi, doneParts[si] || []);

  // If going back to an already-answered step, show the forward button
  if (direction === 'back') {
    setTimeout(() => {
      const fwdBtn = document.getElementById(`step-fwd-${si}-${toPi}`);
      if (fwdBtn && toPi + 1 < STRIPS[si].parts.length) {
        fwdBtn.style.display = 'inline-block';
      }
    }, 300);
  }
  // Hide forward button on the step we left when going forward
  if (direction === 'forward') {
    const fwdBtn = document.getElementById(`step-fwd-${si}-${fromPi}`);
    if (fwdBtn) fwdBtn.style.display = 'none';
  }
}

function pickAnswer(partId, chosenI, correctI) {
  const isCorrect = chosenI === correctI;
  const tryAgainEl = document.getElementById(`try-again-${partId}`);

  if (!isCorrect) {
    const btn = document.querySelector(`[data-part="${partId}"] .opt:nth-child(${chosenI + 1})`);
    if (btn) {
      btn.classList.remove('shake');
      void btn.offsetWidth;
      btn.classList.add('shake');
      btn.addEventListener('animationend', () => btn.classList.remove('shake'), { once: true });
      btn.style.background = 'var(--wrong-soft)';
      setTimeout(() => { btn.style.background = ''; }, 600);
    }
    if (tryAgainEl) {
      tryAgainEl.textContent = '✗ Not quite — try again';
      tryAgainEl.style.display = 'block';
      tryAgainEl.classList.remove('try-again');
      void tryAgainEl.offsetWidth;
      tryAgainEl.classList.add('try-again');
      setTimeout(() => { tryAgainEl.style.display = 'none'; }, 2000);
    }
    return;
  }

  if (tryAgainEl) tryAgainEl.style.display = 'none';

  document.querySelectorAll(`[data-part="${partId}"] .opt`).forEach((b, i) => {
    b.setAttribute('disabled', 'true');
    if (i === correctI) b.classList.add('correct');
    else b.classList.add('dimmed');
  });

  totalAnswered++;
  totalCorrect++;
  updateScore();

  const [si, pi] = partId.split('-').map(Number);
  const part = STRIPS[si].parts[pi];

  if (!doneParts[si]) doneParts[si] = [];
  if (!doneParts[si].includes(pi)) doneParts[si].push(pi);
  updateDots(si, pi + 1, doneParts[si]);

  document.getElementById(`verdict-${partId}`).textContent = `✓ Correct — ${LETTERS[correctI]} is right.`;
  document.getElementById(`rat-${partId}`).textContent = part.rationale;

  const fb = document.getElementById(`fb-${partId}`);
  fb.classList.add('correct');
  requestAnimationFrame(() => requestAnimationFrame(() => fb.classList.add('show')));

  const isLastPart = pi === STRIPS[si].parts.length - 1;

  if (!isLastPart) {
    setTimeout(() => {
      currentPart[si] = pi + 1;
      swapParts(si, pi, pi + 1, 'forward');
      updateDots(si, pi + 1, doneParts[si]);
    }, 500);
  } else {
    updateDots(si, -1, doneParts[si]);
    setTimeout(() => {
      const nextBtn = document.getElementById(`next-btn-${si}`);
      if (nextBtn) nextBtn.style.display = 'block';
    }, 600);
  }
}

function goToStrip(toIdx, direction) {
  const fromEl = document.getElementById(`strip-${currentStrip}`);
  const toEl   = document.getElementById(`strip-${toIdx}`);
  if (!fromEl || !toEl) return;
  const outX = direction === 'forward' ? '-40px' : '40px';
  const inX  = direction === 'forward' ? '40px'  : '-40px';
  fromEl.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
  fromEl.style.opacity = '0';
  fromEl.style.transform = `translateX(${outX})`;
  setTimeout(() => {
    fromEl.style.display = 'none';
    currentStrip = toIdx;
    toEl.style.display = 'block';
    toEl.style.opacity = '0';
    toEl.style.transform = `translateX(${inX})`;
    toEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      toEl.style.opacity = '1';
      toEl.style.transform = 'translateX(0)';
    }));
    updateScore();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 280);
}

function nextStrip() { goToStrip(currentStrip + 1, 'forward'); }
function prevStrip() { if (currentStrip > 0) goToStrip(currentStrip - 1, 'back'); }

function showDone() {
  document.getElementById('strips').innerHTML = `
    <div class="strip-block" style="text-align:center;padding:48px 24px;">
      <div style="font-family:'Fraunces',serif;font-size:2.2rem;font-weight:500;margin-bottom:12px;">All done.</div>
      <div style="font-size:16px;color:var(--ink-mute);margin-bottom:24px;">Final score: ${totalCorrect} / ${totalAnswered} (${Math.round(totalCorrect/totalAnswered*100)}%)</div>
      <button onclick="location.reload()" style="background:var(--accent);color:#fff;border:none;padding:13px 28px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;">Review again</button>
    </div>
  `;
}

// Build all strips
const container = document.getElementById('strips');
STRIPS.forEach((strip, si) => {
  currentPart[si] = 0;
  const block = document.createElement('div');
  block.id = `strip-${si}`;
  block.className = 'strip-block';
  block.style.display = si === 0 ? 'block' : 'none';

  const partsHTML = strip.parts.map((part, pi) => {
    const partId = `${si}-${pi}`;
    const optsHTML = part.options.map((o, i) => `
      <button class="opt" data-part="${partId}" onclick="pickAnswer('${partId}', ${i}, ${part.correct})">
        <span class="opt-letter">${LETTERS[i]}</span>
        <span class="opt-text">${o}</span>
      </button>`).join('');
    return `
      <div id="part-${si}-${pi}" class="part${pi > 0 ? ' hidden' : ''}">
        <div class="part-stem">${part.stem}</div>
        <div class="opts" data-part="${partId}">${optsHTML}</div>
        <div id="try-again-${partId}" class="try-again" style="display:none"></div>
        <div class="feedback" id="fb-${partId}">
          <span class="verdict" id="verdict-${partId}"></span>
          <span id="rat-${partId}"></span>
        </div>
        <div class="step-nav" id="step-nav-${si}-${pi}">
          ${pi > 0 ? `<button class="step-back-btn" onclick="goToPart(${si}, currentPart[${si}], ${pi-1}, 'back')">← prev step</button>` : ''}
          <button class="step-back-btn" id="step-fwd-${si}-${pi}" style="display:none;margin-left:auto" onclick="goToPart(${si}, currentPart[${si}], ${pi+1}, 'forward')">next step →</button>
        </div>
      </div>`;
  }).join('');

  const dotsHTML = strip.parts.map((_, pi) =>
    `<div class="step-dot${pi === 0 ? ' active' : ''}" id="dot-${si}-${pi}"></div>`
  ).join('');

  const isLast = si === STRIPS.length - 1;
  block.innerHTML = `
    <div class="strip-header">
      <div class="strip-nav">
        <button class="nav-btn" onclick="prevStrip()" ${si === 0 ? 'disabled' : ''} id="strip-prev-${si}">← prev</button>
        <span class="strip-num">Strip ${si + 1} / ${STRIPS.length}</span>
        <button class="nav-btn" onclick="nextStrip()" id="strip-next-${si}">next →</button>
      </div>
    </div>
    <div class="img-wrap">
      <div class="img-skeleton" id="skel-${si}"></div>
      <img class="strip-img" id="simg-${si}" src="medsurg2/exam1/images/${strip.file}" alt="EKG Strip"
        onload="this.style.display='block';this.style.opacity=0;document.getElementById('skel-${si}').style.display='none';setTimeout(()=>{document.getElementById('simg-${si}').style.opacity=1;},10);"
        onerror="document.getElementById('skel-${si}').textContent='Image not found: ${strip.file}';" />
    </div>
    <div class="step-dots">${dotsHTML}</div>
    <div class="parts">${partsHTML}</div>
    <button id="next-btn-${si}" class="next-btn" style="display:none"
      onclick="${isLast ? 'showDone()' : 'nextStrip()'}">
      ${isLast ? 'See results →' : 'Next strip →'}
    </button>
  `;
  container.appendChild(block);
});

updateScore();
</script>
</body>
</html>
