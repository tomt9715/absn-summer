<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedSurg II — Exams</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../shared/hub.css">
</head>
<body>
<div class="accent-band"></div>
<div class="wrap">
  <header class="hero">
    <div class="hero-inner">
      <a href="../index.html" class="hub-back">← All courses</a>
      <span class="eyebrow">MedSurg II · Manhattanville</span>
      <h1 class="hero-title">MedSurg II <em>Exams</em></h1>
    </div>
  </header>

  <div id="exam-list"></div>

  <div class="donation-footer">
    <div class="msg"><strong>Built this to help us all pass.</strong><br>Took a fair few hours to put together — if it helped your studying, a few bucks is always appreciated.</div>
    <div class="donation-links">
      <a href="https://venmo.com/Tom_Thomas" target="_blank" rel="noopener" class="donate-btn venmo"><img src="../shared/assets/venmo.png" alt="Venmo"></a>
      <a href="#" class="donate-btn zelle"><img src="../shared/assets/zelle.png" alt="Zelle"><span class="znum">(914) 646-0456</span></a>
    </div>
  </div>
</div>

<script>
  // ── Add exams here as they're built ──
  const EXAMS = [
    { name: "Exam 1", topics: "Dysrhythmias · Vision & Hearing", date: "June 16", href: "exam1/index.html", ready: true },
    { name: "Exam 2", topics: "TBD", date: "TBD", href: null, ready: false },
    { name: "Exam 3", topics: "TBD", date: "TBD", href: null, ready: false },
    { name: "Final",  topics: "Comprehensive", date: "TBD", href: null, ready: false }
  ];

  const wrap = document.getElementById('exam-list');
  let html = '<div class="nav-grid two">';
  EXAMS.forEach((e, i) => {
    const cls = e.ready ? 'quiz-card' : 'quiz-card sim-locked';
    const href = e.href || '#';
    const badge = e.ready
      ? '<span class="score-badge done">Ready</span>'
      : '<span class="score-badge fresh">Soon</span>';
    html += `<a class="${cls}" href="${href}">
      <div class="qc-top"><span class="qc-type">${e.date}</span>${badge}</div>
      <div class="qc-name">${e.name}</div>
      <div class="qc-desc">${e.topics}</div>
    </a>`;
  });
  html += '</div>';
  wrap.innerHTML = html;
</script>
</body>
</html>
