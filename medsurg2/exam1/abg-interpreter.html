<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABG Interpreter — Tic-Tac-Toe Method</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #f6f4ef; --surface: #ffffff; --surface2: #fbfaf7;
  --border: #e4e0d6; --border-strong: #d4cfc2;
  --ink: #232020; --ink-soft: #4f4a43; --ink-mute: #847d71;
  --accent: #b5482e; --accent-deep: #9c3c25; --accent-soft: #f3e0d9;
  --gold: #b08534; --gold-soft: #f6ecd6;
  --teal: #2f6f6b; --teal-soft: #dcebe9;
  --correct: #2f7d4f; --correct-soft: #ddf0e2; --correct-border: #b9ddc4;
  --wrong: #b5482e; --wrong-soft: #f6e2dc; --wrong-border: #e6c0b4;
  --acid: #b5482e; --acid-soft: #f3e0d9;
  --base: #2f6f6b; --base-soft: #dcebe9;
  --norm: #b08534; --norm-soft: #f6ecd6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh; padding: 2rem 1rem 5rem;
  font-size: 17px; line-height: 1.5;
}
.wrap { max-width: 1100px; margin: 0 auto; }

/* Header */
.top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.back-link {
  font-size: 14px; color: var(--ink-mute); text-decoration: none;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 13px; border: 1px solid var(--border); border-radius: 7px;
  background: var(--surface); transition: all 0.15s;
}
.back-link:hover { border-color: var(--accent); color: var(--accent); }
.quiz-type-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--accent); background: var(--accent-soft);
  padding: 4px 11px; border-radius: 5px; display: inline-block; margin-bottom: 0.8rem;
}
h1 { font-family: 'Fraunces', serif; font-size: 2.1rem; font-weight: 500; color: var(--ink); line-height: 1.1; }
.quiz-sub { font-size: 16px; color: var(--ink-mute); margin-top: 0.5rem; }

/* Progress */
.progress-row { display: flex; align-items: center; gap: 14px; margin-bottom: 1.4rem; }
.progress-track { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
.progress-label { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--ink-mute); white-space: nowrap; }
.score-pill { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--teal); background: var(--teal-soft); padding: 3px 10px; border-radius: 5px; white-space: nowrap; }

/* Question card */
.question-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 28px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.q-meta { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
.q-num { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--ink-mute); }
.q-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 3px 9px;
  border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em;
  background: var(--teal-soft); color: var(--teal);
}

/* Scenario text */
.q-stem {
  font-size: 18px; line-height: 1.75; color: var(--ink-soft);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; padding: 18px 20px;
}
.q-stem strong { color: var(--ink); font-weight: 600; }

/* Method toggle */
.method-toggle {
  display: flex; align-items: center; gap: 8px; margin: 14px 0 0;
}
.method-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-mute); }
.method-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
  padding: 6px 14px; border-radius: 7px; cursor: pointer; border: 1.5px solid var(--border-strong);
  background: var(--surface2); color: var(--ink-mute); transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.method-btn:hover { border-color: var(--accent); color: var(--accent); }
.method-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ROME panel */
.rome-rows { display: flex; flex-direction: column; gap: 8px; }
.rome-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; transition: border-color 0.2s;
}
.rome-row.classified { border-color: var(--teal); }
.rome-val-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-mute); min-width: 48px; }
.rome-val-num { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: var(--ink); min-width: 38px; }
.rome-btns { display: flex; gap: 5px; flex: 1; justify-content: flex-end; }
.rome-pick-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
  padding: 5px 9px; border-radius: 6px; cursor: pointer;
  border: 1.5px solid var(--border-strong); background: transparent;
  color: var(--ink-mute); transition: all 0.12s; white-space: nowrap;
}
.rome-pick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.rome-pick-btn.selected { background: var(--teal); color: #fff; border-color: var(--teal); }

/* ROME conclusion */
.rome-conclusion-box {
  margin-top: 10px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
}
.rome-concl-line { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 13px; }
.rome-concl-label { font-family: 'JetBrains Mono', monospace; color: var(--ink-mute); font-size: 12px; }
.rome-concl-val { font-weight: 700; font-size: 13px; }
.rome-resp  { color: var(--accent); }
.rome-metab { color: var(--teal); }
.rome-dim   { color: var(--ink-mute); font-weight: 400; }
.q-body {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 22px;
  align-items: start;
  margin-top: 18px;
}
.q-left { min-width: 0; }
.q-right { position: sticky; top: 20px; }

/* TTT panel */
.ttt-section {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px;
}
.ttt-label {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute);
  margin-bottom: 10px;
}
.ttt-grid { width: 100%; border-collapse: collapse; table-layout: fixed; }
.ttt-grid td { vertical-align: middle; }
.ttt-cell { display: flex; justify-content: center; align-items: center; min-height: 44px; }
.place-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: 6px; cursor: pointer;
  border: 1.5px dashed var(--border-strong); background: transparent;
  color: var(--ink-mute); transition: all 0.12s; line-height: 1.4;
}
.place-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.token {
  font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
  padding: 7px 13px; border-radius: 6px; cursor: pointer;
  transition: all 0.12s; border: 1.5px solid transparent;
  display: inline-flex; align-items: center; gap: 5px;
}
.token.acid-tok  { background: var(--acid-soft);  color: var(--acid);  border-color: #e8b5a8; }
.token.norm-tok  { background: var(--norm-soft);  color: var(--norm);  border-color: #e0c88a; }
.token.base-tok  { background: var(--base-soft);  color: var(--base);  border-color: #a8ccc9; }
.token .tok-x { font-size: 11px; opacity: 0.6; }
.token:hover .tok-x { opacity: 1; }
.tray-hint { font-size: 13px; color: var(--ink-mute); margin-top: 8px; font-style: italic; line-height: 1.5; }

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt {
  display: flex; align-items: flex-start; gap: 13px;
  padding: 16px 18px; border: 1px solid var(--border-strong);
  border-radius: 9px; cursor: pointer; background: var(--surface2);
  transition: all 0.12s; text-align: left; width: 100%;
  font-family: 'DM Sans', sans-serif;
}
.opt:hover:not([disabled]) { border-color: var(--accent); background: var(--accent-soft); }
.opt-letter { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--ink-mute); min-width: 20px; margin-top: 1px; font-weight: 600; }
.opt-text { font-size: 17px; color: var(--ink); line-height: 1.5; }
.opt[disabled] { cursor: default; }
.opt.correct { border-color: var(--correct); background: var(--correct-soft); }
.opt.correct .opt-letter, .opt.correct .opt-text { color: var(--correct); font-weight: 600; }
.opt.wrong { border-color: var(--wrong); background: var(--wrong-soft); }
.opt.wrong .opt-letter, .opt.wrong .opt-text { color: var(--wrong); }
.opt.dimmed { opacity: 0.4; }

/* Rationale */
.rationale {
  margin-top: 16px; padding: 16px 18px; border-radius: 9px;
  font-size: 16px; line-height: 1.7; border-left: 3px solid;
}
.rationale.r-correct { background: var(--correct-soft); border-color: var(--correct); color: #1a4d30; }
.rationale.r-wrong   { background: var(--wrong-soft);   border-color: var(--wrong);   color: #7a2a18; }
.verdict { font-weight: 700; display: block; margin-bottom: 8px; font-size: 17px; }

/* Reveal grid in rationale */
.ttt-reveal {
  margin: 10px 0; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.08);
  border-radius: 8px; padding: 12px;
}
.reveal-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.7; margin-bottom: 8px; }
.reveal-grid { width: 100%; border-collapse: collapse; table-layout: fixed; }
.reveal-grid td { vertical-align: middle; }
.cell-placed { font-weight: 700; padding: 4px 10px; border-radius: 4px; font-size: 13px; }
.cell-placed.acid-tok { background: var(--acid-soft); color: var(--acid); }
.cell-placed.norm-tok { background: var(--norm-soft); color: var(--norm); }
.cell-placed.base-tok { background: var(--base-soft); color: var(--base); }
.cell-empty { opacity: 0.25; font-size: 14px; }

.next-btn {
  display: block; margin: 16px 0 0; padding: 13px 24px;
  background: var(--accent); color: #fff; border: none; border-radius: 9px;
  font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.next-btn:hover { background: var(--accent-deep); }

/* Results */
.results-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 36px 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
.score-big { font-family: 'Fraunces', serif; font-size: 5rem; font-weight: 600; line-height: 1; margin-bottom: 8px; }
.score-big.pass { color: var(--correct); }
.score-big.fail { color: var(--wrong); }
.score-sub { font-size: 17px; color: var(--ink-soft); margin-bottom: 8px; }
.score-msg { font-size: 17px; color: var(--ink-mute); margin-bottom: 24px; }
.results-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.r-tab { font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 8px 18px; border: 1px solid var(--border-strong); border-radius: 7px; background: var(--surface2); color: var(--ink-soft); cursor: pointer; transition: all 0.12s; }
.r-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.review-item { padding: 18px 0; border-bottom: 1px solid var(--border); }
.review-item:last-child { border-bottom: none; }
.ri-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ri-result { font-size: 14px; font-weight: 600; padding: 2px 9px; border-radius: 4px; }
.ri-result.correct { background: var(--correct-soft); color: var(--correct); }
.ri-result.wrong { background: var(--wrong-soft); color: var(--wrong); }
.review-item-q { font-size: 15px; color: var(--ink-soft); margin-bottom: 8px; line-height: 1.6; background: var(--surface2); padding: 10px 12px; border-radius: 7px; }
.review-item-ans { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.ri-yours { font-size: 15px; color: var(--wrong); }
.ri-correct-ans { font-size: 15px; color: var(--correct); font-weight: 600; }
.ri-rationale { font-size: 15px; color: var(--ink-soft); line-height: 1.6; background: var(--surface2); padding: 12px 14px; border-radius: 8px; }
.results-actions { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
.action-btn { padding: 13px 24px; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; transition: all 0.15s; }
.action-btn.primary { background: var(--accent); color: #fff; border: none; }
.action-btn.primary:hover { background: var(--accent-deep); }
.action-btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--border-strong); }
.action-btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
.empty-msg { color: var(--ink-mute); font-size: 15px; padding: 16px 0; display: flex; align-items: center; gap: 8px; }

@media (max-width: 720px) {
  h1 { font-size: 1.6rem; }
  .question-card { padding: 18px 14px; }
  .q-body { grid-template-columns: 1fr; }
  .q-right { position: static; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <a href="index.html" class="back-link">← Back to hub</a>
  </div>
  <div class="quiz-title-row">
    <span class="quiz-type-tag">ABG Interpreter</span>
    <h1>Arterial Blood Gas<br><em>Tic-Tac-Toe Method</em></h1>
    <p class="quiz-sub">20 scenarios · plot the values · identify the disturbance</p>
  </div>
  <div id="quiz-area"></div>
</div>

<script>
const ABG_QUESTIONS = [
  {
    scenario: `A 24-year-old woman is brought to the emergency room by ambulance after bystanders found her lethargic and confused on the street. Her oxygen saturation is 88% on room air. On exam she has pinpoint pupils. An arterial blood gas on room air reveals: <strong>pH 7.25, PaCO₂ 60 mmHg, PO₂ 65 mmHg, HCO₃⁻ 26 mEq/L</strong>. Her sodium is 137, chloride 100.`,
    ph: 7.25, co2: 60, hco3: 26,
    answers: ["Uncompensated Respiratory Acidosis","Partially Compensated Respiratory Acidosis","Uncompensated Metabolic Acidosis","Fully Compensated Metabolic Alkalosis"],
    correct: 0,
    rationale: "pH 7.25 is acidotic. PaCO₂ 60 is elevated — acid column. HCO₃⁻ 26 is normal — the kidneys have not yet responded. pH and PaCO₂ both in the acid column → Respiratory. HCO₃⁻ normal → no compensation → Uncompensated Respiratory Acidosis. Pinpoint pupils, lethargy, and hypoxia with CO₂ retention is classic opioid overdose causing acute hypoventilation. The kidneys need days to compensate — this is too acute."
  },
  {
    scenario: `A 60-year-old man with amyotrophic lateral sclerosis (ALS) is brought to clinic by his family, who are concerned he is more somnolent than usual. They report morning headaches and poor sleep quality. An arterial blood gas reveals: <strong>pH 7.37, PaCO₂ 57 mmHg, PO₂ 70 mmHg, HCO₃⁻ 32 mEq/L</strong>.`,
    ph: 7.37, co2: 57, hco3: 32,
    answers: ["Fully Compensated Respiratory Acidosis","Partially Compensated Respiratory Acidosis","Uncompensated Metabolic Alkalosis","Normal — no disturbance"],
    correct: 0,
    rationale: "pH 7.37 is normal but leans toward acid (low-normal). PaCO₂ 57 is elevated — acid column. HCO₃⁻ 32 is elevated — base column. Both values are abnormal but pH is back in normal range → Fully Compensated. pH leaning toward acid + PaCO₂ abnormal → Respiratory → Fully Compensated Respiratory Acidosis. ALS causes progressive respiratory muscle weakness; chronic CO₂ retention with renal bicarbonate retention is the expected long-term picture."
  },
  {
    scenario: `A 19-year-old nursing student is found hyperventilating in the break room before a high-stakes exam. She is anxious, breathing rapidly, and complains of tingling in her fingers. A colleague obtains an arterial blood gas: <strong>pH 7.52, PaCO₂ 30 mmHg, HCO₃⁻ 24 mEq/L</strong>.`,
    ph: 7.52, co2: 30, hco3: 24,
    answers: ["Uncompensated Respiratory Alkalosis","Uncompensated Metabolic Alkalosis","Partially Compensated Respiratory Alkalosis","Fully Compensated Metabolic Alkalosis"],
    correct: 0,
    rationale: "pH 7.52 is alkalotic. PaCO₂ 30 is low — base column. HCO₃⁻ 24 is normal — kidneys have not responded. pH and PaCO₂ both in the base column → Respiratory. HCO₃⁻ normal → no compensation → Uncompensated Respiratory Alkalosis. Hyperventilation blows off CO₂, raising pH. The professor flagged this exact scenario: anxiety-driven hyperventilation = respiratory alkalosis."
  },
  {
    scenario: `A 58-year-old man with a history of type 1 diabetes mellitus is brought to the emergency department by his daughter. He is confused and breathing deeply and rapidly. She reports he has not taken insulin in 3 days. Arterial blood gas: <strong>pH 7.22, PaCO₂ 26 mmHg, HCO₃⁻ 10 mEq/L</strong>. Serum glucose is 580 mg/dL.`,
    ph: 7.22, co2: 26, hco3: 10,
    answers: ["Partially Compensated Metabolic Acidosis","Uncompensated Metabolic Acidosis","Partially Compensated Respiratory Alkalosis","Uncompensated Respiratory Acidosis"],
    correct: 0,
    rationale: "pH 7.22 is acidotic. HCO₃⁻ 10 is very low — acid column. PaCO₂ 26 is low — base column (lungs blowing off CO₂ to compensate). pH and HCO₃⁻ both in the acid column → Metabolic. Both PaCO₂ and HCO₃⁻ are abnormal but pH is still acidotic → Partially Compensated Metabolic Acidosis. The deep rapid breathing is Kussmaul breathing — the body compensating for the acid load of diabetic ketoacidosis (DKA). Insulin deficiency leads to ketone accumulation, dropping bicarbonate."
  },
  {
    scenario: `A 72-year-old woman with chronic obstructive pulmonary disease (COPD) presents to her pulmonologist for a routine follow-up. She feels at her baseline, uses 2L home oxygen, and reports no new symptoms. Arterial blood gas on her home oxygen: <strong>pH 7.38, PaCO₂ 54 mmHg, HCO₃⁻ 31 mEq/L</strong>.`,
    ph: 7.38, co2: 54, hco3: 31,
    answers: ["Fully Compensated Respiratory Acidosis","Partially Compensated Respiratory Acidosis","Fully Compensated Metabolic Alkalosis","Uncompensated Respiratory Acidosis"],
    correct: 0,
    rationale: "pH 7.38 is normal, leaning toward acid (low-normal). PaCO₂ 54 is elevated — acid column. HCO₃⁻ 31 is elevated — base column. Both values abnormal but pH normal → Fully Compensated. pH leans toward acid + PaCO₂ is the primary abnormality → Respiratory → Fully Compensated Respiratory Acidosis. This is a classic chronic CO₂ retainer: the kidneys have retained bicarbonate over time to normalize pH. This is her baseline, not an acute event."
  },
  {
    scenario: `A 34-year-old woman is admitted with nausea and vomiting for 4 days following abdominal surgery. She also had nasogastric (NG) tube suctioning for 2 days. She reports muscle cramps and tingling in her hands. Arterial blood gas: <strong>pH 7.51, PaCO₂ 44 mmHg, HCO₃⁻ 34 mEq/L</strong>.`,
    ph: 7.51, co2: 44, hco3: 34,
    answers: ["Uncompensated Metabolic Alkalosis","Uncompensated Respiratory Alkalosis","Partially Compensated Metabolic Alkalosis","Fully Compensated Respiratory Alkalosis"],
    correct: 0,
    rationale: "pH 7.51 is alkalotic. HCO₃⁻ 34 is elevated — base column. PaCO₂ 44 is normal — lungs have not yet compensated. pH and HCO₃⁻ both in the base column → Metabolic. PaCO₂ normal → no compensation → Uncompensated Metabolic Alkalosis. Vomiting and NG suctioning remove hydrochloric acid (HCl), causing bicarbonate to accumulate and pH to rise."
  },
  {
    scenario: `A 45-year-old man with end-stage renal disease is seen in the nephrology clinic. He reports fatigue and decreased appetite. He is not yet on dialysis. His breathing appears slightly labored. Arterial blood gas: <strong>pH 7.29, PaCO₂ 28 mmHg, HCO₃⁻ 14 mEq/L</strong>.`,
    ph: 7.29, co2: 28, hco3: 14,
    answers: ["Partially Compensated Metabolic Acidosis","Uncompensated Metabolic Acidosis","Partially Compensated Respiratory Acidosis","Fully Compensated Metabolic Acidosis"],
    correct: 0,
    rationale: "pH 7.29 is acidotic. HCO₃⁻ 14 is low — acid column. PaCO₂ 28 is low — base column (lungs compensating by blowing off CO₂). pH and HCO₃⁻ both in the acid column → Metabolic. Both PaCO₂ and HCO₃⁻ are abnormal but pH still acidotic → Partially Compensated Metabolic Acidosis. Chronic kidney disease impairs bicarbonate reabsorption, driving metabolic acidosis; the lungs compensate by hyperventilating."
  },
  {
    scenario: `A 28-year-old man with a history of asthma is brought to the emergency department after a severe attack that has not responded to nebulizer treatment over 3 hours. He was initially tachypneic but is now breathing slowly and appears exhausted. Arterial blood gas: <strong>pH 7.26, PaCO₂ 58 mmHg, HCO₃⁻ 26 mEq/L</strong>.`,
    ph: 7.26, co2: 58, hco3: 26,
    answers: ["Uncompensated Respiratory Acidosis","Partially Compensated Respiratory Acidosis","Uncompensated Metabolic Acidosis","Fully Compensated Respiratory Acidosis"],
    correct: 0,
    rationale: "pH 7.26 is acidotic. PaCO₂ 58 is elevated — acid column. HCO₃⁻ 26 is normal — kidneys have not yet compensated. pH and PaCO₂ both in the acid column → Respiratory. HCO₃⁻ normal → no compensation → Uncompensated Respiratory Acidosis. A rising CO₂ in an asthmatic who was previously tachypneic is an ominous sign — it signals respiratory muscle fatigue and impending respiratory failure requiring immediate intervention."
  },
  {
    scenario: `A 52-year-old woman with rheumatoid arthritis took an entire bottle of aspirin after an argument with her family. She is brought in by EMS, anxious, flushed, and breathing rapidly. Arterial blood gas: <strong>pH 7.50, PaCO₂ 27 mmHg, HCO₃⁻ 24 mEq/L</strong>.`,
    ph: 7.50, co2: 27, hco3: 24,
    answers: ["Uncompensated Respiratory Alkalosis","Partially Compensated Metabolic Alkalosis","Uncompensated Metabolic Alkalosis","Fully Compensated Respiratory Alkalosis"],
    correct: 0,
    rationale: "pH 7.50 is alkalotic. PaCO₂ 27 is low — base column. HCO₃⁻ 24 is normal — no metabolic compensation yet. pH and PaCO₂ both in base column → Respiratory. HCO₃⁻ normal → no compensation → Uncompensated Respiratory Alkalosis. Salicylate toxicity directly stimulates the medullary respiratory center, causing hyperventilation and CO₂ washout. This is the early phase — metabolic acidosis develops later."

function setMethod(m) {
  abgMethod = m;
  const ttt = document.getElementById('method-ttt');
  const rome = document.getElementById('method-rome');
  const btnTtt = document.getElementById('btn-ttt');
  const btnRome = document.getElementById('btn-rome');
  if (ttt)  ttt.style.display  = m === 'ttt'  ? 'block' : 'none';
  if (rome) rome.style.display = m === 'rome' ? 'block' : 'none';
  if (btnTtt)  btnTtt.classList.toggle('active',  m === 'ttt');
  if (btnRome) btnRome.classList.toggle('active', m === 'rome');
  if (m === 'ttt') renderGrid(answered);
}

function romeClassify(key, dir) {
  if (answered) return;
  romeState[key] = dir;

  // Update button states for this row
  const row = document.getElementById(`rome-row-${key}`);
  if (row) {
    row.querySelectorAll('.rome-pick-btn').forEach(b => {
      b.classList.remove('selected');
      if ((dir === 'high'   && b.textContent.includes('↑')) ||
          (dir === 'normal' && b.textContent.includes('→')) ||
          (dir === 'low'    && b.textContent.includes('↓'))) {
        b.classList.add('selected');
      }
    });
    // Mark row as done
    row.classList.add('classified');
  }

  // Check if all three are classified
  if (romeState.ph && romeState.co2 && romeState.hco3) {
    showRomeConclusion();
  }
}

function showRomeConclusion() {
  const conclusion = document.getElementById('rome-conclusion');
  if (!conclusion) return;

  const phDir  = romeState.ph;
  const co2Dir = romeState.co2;
  const hcoDir = romeState.hco3;

  // Determine acidosis/alkalosis
  const acidBase = phDir === 'low' ? 'Acidosis' : phDir === 'high' ? 'Alkalosis' : 'Normal pH';
  const phArrow  = phDir === 'low' ? '↓' : phDir === 'high' ? '↑' : '→';

  // ROME checks
  const respOpposite =
    (phDir === 'low'  && co2Dir === 'high') ||
    (phDir === 'high' && co2Dir === 'low');
  const metabSame =
    (phDir === 'low'  && hcoDir === 'low')  ||
    (phDir === 'high' && hcoDir === 'high');

  const co2Arrow = co2Dir === 'high' ? '↑' : co2Dir === 'low' ? '↓' : '→';
  const hcoArrow = hcoDir === 'high' ? '↑' : hcoDir === 'low' ? '↓' : '→';

  let html = `<div class="rome-conclusion-box">`;
  html += `<div class="rome-concl-line"><span class="rome-concl-label">pH ${phArrow}</span><span class="rome-concl-val">${acidBase}</span></div>`;
  html += `<div class="rome-concl-line">
    <span class="rome-concl-label">PaCO₂ ${co2Arrow} vs pH ${phArrow}</span>
    <span class="rome-concl-val ${respOpposite ? 'rome-resp' : 'rome-dim'}">${respOpposite ? 'Opposite → Respiratory' : 'Same → Not Respiratory'}</span>
  </div>`;
  html += `<div class="rome-concl-line">
    <span class="rome-concl-label">HCO₃⁻ ${hcoArrow} vs pH ${phArrow}</span>
    <span class="rome-concl-val ${metabSame ? 'rome-metab' : 'rome-dim'}">${metabSame ? 'Same → Metabolic' : 'Opposite → Not Metabolic'}</span>
  </div>`;
  html += `</div>`;

  conclusion.innerHTML = html;
  conclusion.style.display = 'block';
  conclusion.style.opacity = '0';
  conclusion.style.transform = 'translateY(6px)';
  conclusion.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    conclusion.style.opacity = '1';
    conclusion.style.transform = 'translateY(0)';
  }));
}

function colClass(col) {
  return col === 'acid' ? 'acid-tok' : col === 'norm' ? 'norm-tok' : col === 'base' ? 'base-tok' : '';
}
function colLabel(col) {
  return col === 'acid' ? 'Acid' : col === 'norm' ? 'Normal' : 'Base';
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function classify(key, q) {
  const v = parseFloat(key === 'ph' ? q.ph : key === 'co2' ? q.co2 : q.hco3);
  if (key === 'ph')  return v < 7.35 ? 'acid' : v > 7.45 ? 'base' : 'norm';
  if (key === 'co2') return v > 45   ? 'acid' : v < 35   ? 'base' : 'norm';
  if (key === 'hco3') return v < 22  ? 'acid' : v > 26   ? 'base' : 'norm';
}

function buildDeck() {
  deck = shuffle(ABG_QUESTIONS).map(q => ({
    ...q,
    opts: shuffle(q.answers.map((text, i) => ({ text, isCorrect: i === q.correct })))
  }));
}
function startQuiz() {
  buildDeck(); idx = 0; correctCount = 0; answered = false; results = [];
  renderQuestion();
}
function resetGrid() {
  gridState = { ph: null, co2: null, hco3: null };
  romeState  = { ph: null, co2: null, hco3: null };
}

function placeToken(rowKey, col) {
  if (answered) return;
  gridState[rowKey] = col;
  renderGrid(false);
}
function removeToken(rowKey) {
  if (answered) return;
  gridState[rowKey] = null;
  renderGrid(false);
}

function renderGrid(locked) {
  const wrap = document.getElementById('ttt-wrap');
  if (!wrap) return;
  const cols = ['acid','norm','base'];
  const colLabels = { acid: 'ACID', norm: 'NORMAL', base: 'BASE' };
  const colColors = { acid: 'var(--acid)', norm: 'var(--norm)', base: 'var(--base)' };
  const colBgs    = { acid: 'var(--acid-soft)', norm: 'var(--norm-soft)', base: 'var(--base-soft)' };

  let html = `<table class="ttt-grid"><tbody>`;

  // Top row — the 3 label squares
  html += `<tr>`;
  cols.forEach(col => {
    html += `<td style="background:${colBgs[col]};border:2px solid ${colColors[col]};text-align:center;padding:10px 4px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${colColors[col]};letter-spacing:0.06em;">${colLabels[col]}</td>`;
  });
  html += `</tr>`;

  // Rows 2 and 3 — pH, PaCO₂, HCO₃⁻
  ROWS.forEach(row => {
    html += `<tr>`;
    cols.forEach(col => {
      const placed = gridState[row.key] === col;
      html += `<td style="border:1px solid var(--border);height:60px;text-align:center;vertical-align:middle;padding:4px;">`;
      html += `<div class="ttt-cell">`;
      if (placed && !locked) {
        html += `<button class="token ${colClass(col)}" onclick="removeToken('${row.key}')">${row.label} <span class="tok-x">✕</span></button>`;
      } else if (placed && locked) {
        html += `<span class="token ${colClass(col)}" style="cursor:default">${row.label}</span>`;
      } else if (!locked && gridState[row.key] === null) {
        html += `<button class="place-btn" onclick="placeToken('${row.key}','${col}')" title="${row.label}">${row.label}</button>`;
      }
      html += `</div></td>`;
    });
    html += `</tr>`;
  });

  html += `</tbody></table>`;

  if (!locked) {
    const allPlaced = ROWS.every(r => gridState[r.key] !== null);
    html += `<p class="tray-hint">${allPlaced ? '✓ Grid filled — select your answer.' : 'Click a cell to place each value. Click a token to move it.'}</p>`;
  }
  wrap.innerHTML = html;
}

function renderRevealGrid(q) {
  const cols = ['acid','norm','base'];
  const colLabels = { acid: 'ACID', norm: 'NORMAL', base: 'BASE' };
  const colColors = { acid: 'var(--acid)', norm: 'var(--norm)', base: 'var(--base)' };
  const colBgs    = { acid: 'var(--acid-soft)', norm: 'var(--norm-soft)', base: 'var(--base-soft)' };

  let html = `<table class="reveal-grid"><tbody>`;

  // Top row — label squares
  html += `<tr>`;
  cols.forEach(col => {
    html += `<td style="background:${colBgs[col]};border:2px solid ${colColors[col]};text-align:center;padding:8px 4px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:${colColors[col]};letter-spacing:0.06em;">${colLabels[col]}</td>`;
  });
  html += `</tr>`;

  // Value rows
  ROWS.forEach(row => {
    const correctCol = classify(row.key, q);
    html += `<tr>`;
    cols.forEach(col => {
      if (col === correctCol) {
        const studentOk = gridState[row.key] === col;
        html += `<td style="border:1px solid rgba(0,0,0,0.08);padding:7px 4px;text-align:center;"><span class="cell-placed ${colClass(col)}">${row.label}${studentOk ? ' ✓' : ''}</span></td>`;
      } else {
        html += `<td style="border:1px solid rgba(0,0,0,0.08);padding:7px 4px;text-align:center;"><span class="cell-empty">·</span></td>`;
      }
    });
    html += `</tr>`;
  });

  return html + `</tbody></table>`;
}

function pick(chosenI) {
  if (answered) return;
  answered = true;
  const q = deck[idx];
  const correctI = q.opts.findIndex(o => o.isCorrect);
  const isCorrect = chosenI === correctI;
  if (isCorrect) correctCount++;

  renderGrid(true);
  document.querySelectorAll('.opt').forEach((b, i) => {
    b.setAttribute('disabled', 'true');
    if (i === correctI) b.classList.add('correct');
    else if (i === chosenI) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });

  results.push({ stem: q.scenario, ph: q.ph, co2: q.co2, hco3: q.hco3,
    yourLetter: LETTERS[chosenI], yourText: q.opts[chosenI].text,
    correctLetter: LETTERS[correctI], correctText: q.opts[correctI].text,
    isCorrect, rationale: q.rationale, q });

  const verdict = isCorrect
    ? `✓ Correct — ${LETTERS[correctI]} is right.`
    : `✗ You chose ${LETTERS[chosenI]}. Correct: ${LETTERS[correctI]}.`;
  const cls = isCorrect ? 'r-correct' : 'r-wrong';
  const isLast = idx === deck.length - 1;

  document.getElementById('feedback').innerHTML = `
    <div class="rationale ${cls}">
      <span class="verdict">${verdict}</span>
      <div class="ttt-reveal">
        <div class="reveal-label"><i class="fa-solid fa-check-double"></i> &nbsp;Correct grid placement</div>
        ${renderRevealGrid(q)}
      </div>
      <div style="margin-top:10px">${q.rationale}</div>
    </div>
    <button class="next-btn" onclick="__abgNext()">${isLast ? 'See results →' : 'Next question →'}</button>`;
}

function next() {
  if (idx < deck.length - 1) { idx++; renderQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  else showResults();
}

function showResults() {
  const pct = Math.round((correctCount / deck.length) * 100);
  const pass = pct >= PASS;
  try {
    const prev = parseInt(localStorage.getItem(KEY + '_best') || '0', 10);
    if (pct > prev) localStorage.setItem(KEY + '_best', String(pct));
    localStorage.setItem(KEY + '_last', String(pct));
  } catch(e) {}
  const msg = pct >= 90 ? "Sharp. ABGs are yours — keep that method locked in."
    : pct >= PASS ? "Passing. Review the ones you missed and you'll nail these on exam day."
    : "Below passing — go through the rationales carefully and retake. The method clicks with repetition.";

  document.getElementById('quiz-area').innerHTML = `
    <div class="results-card">
      <div class="score-big ${pass ? 'pass' : 'fail'}">${pct}%</div>
      <div class="score-sub">${correctCount} / ${deck.length} correct · ABG Interpreter</div>
      <div class="score-msg">${msg}</div>
      <div class="results-tabs">
        <button class="r-tab ${activeTab==='full'?'active':''}" onclick="__abgTab('full',this)">Full Review</button>
        <button class="r-tab ${activeTab==='missed'?'active':''}" onclick="__abgTab('missed',this)">Missed Only</button>
      </div>
      <div class="review-list" id="review-list"></div>
      <div class="results-actions">
        <button class="action-btn primary" onclick="__abgStart()">Retake quiz</button>
        <a class="action-btn ghost" href="index.html">Back to hub</a>
      </div>
    </div>`;
  renderReview();
}

function setTab(t, el) {
  activeTab = t;
  document.querySelectorAll('.r-tab').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderReview();
}

function renderReview() {
  const list = document.getElementById('review-list');
  let items = results.map((r, i) => ({ ...r, n: i + 1 }));
  if (activeTab === 'missed') items = items.filter(r => !r.isCorrect);
  if (!items.length) {
    list.innerHTML = `<div class="empty-msg">${activeTab === 'missed' ? '<i class="fa-solid fa-circle-check" style="color:var(--correct)"></i> No missed questions — perfect score!' : 'Nothing here.'}</div>`;
    return;
  }
  list.innerHTML = items.map(r => `
    <div class="review-item">
      <div class="ri-meta">
        <span class="q-num">Q${r.n}</span>
        <span class="ri-result ${r.isCorrect ? 'correct' : 'wrong'}">${r.isCorrect ? '✓ Correct' : '✗ Missed'}</span>
      </div>
      <div class="review-item-q">${r.stem}</div>
      <div class="review-item-ans">
        ${r.isCorrect
          ? `<span class="ri-correct-ans">Your answer: ${r.yourLetter} — ${r.yourText} ✓</span>`
          : `<span class="ri-yours">You chose: ${r.yourLetter} — ${r.yourText}</span>
             <span class="ri-correct-ans">Correct: ${r.correctLetter} — ${r.correctText}</span>`}
      </div>
      <div class="ri-rationale">${r.rationale}</div>
    </div>`).join('');
}

window.__abgPick = pick;
window.__abgNext = next;
window.__abgTab = setTab;
window.__abgStart = startQuiz;
window.placeToken = placeToken;
window.removeToken = removeToken;
window.setMethod = setMethod;
window.romeClassify = romeClassify;

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startQuiz);
else startQuiz();
</script>
</body>
</html>
