<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKG Strip Interpreter — 4-Step Framework</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #f6f4ef; --surface: #fff; --surface2: #fbfaf7;
  --border: #e4e0d6; --border-strong: #d4cfc2;
  --ink: #232020; --ink-soft: #4f4a43; --ink-mute: #847d71;
  --accent: #b5482e; --accent-deep: #9c3c25; --accent-soft: #f3e0d9;
  --teal: #2f6f6b; --teal-soft: #dcebe9;
  --correct: #2f7d4f; --correct-soft: #ddf0e2;
  --wrong: #b5482e; --wrong-soft: #f6e2dc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem 1rem 5rem; font-size: 17px; line-height: 1.5; }
.wrap { max-width: 900px; margin: 0 auto; }
.top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.back-link { font-size: 14px; color: var(--ink-mute); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border: 1px solid var(--border); border-radius: 7px; background: var(--surface); transition: all 0.15s; }
.back-link:hover { border-color: var(--accent); color: var(--accent); }
.quiz-type-tag { font-family: 'JetBrains Mono', monospace; font-size: 13px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--teal); background: var(--teal-soft); padding: 4px 11px; border-radius: 5px; display: inline-block; margin-bottom: 0.8rem; }
h1 { font-family: 'Fraunces', serif; font-size: 2.1rem; font-weight: 500; color: var(--ink); line-height: 1.1; }
.quiz-sub { font-size: 16px; color: var(--ink-mute); margin-top: 0.5rem; margin-bottom: 1.5rem; }

/* Progress */
.progress-row { display: flex; align-items: center; gap: 14px; margin-bottom: 1.4rem; }
.progress-track { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; width: 0%; background: var(--teal); border-radius: 4px; transition: width 0.3s; }
.progress-label { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--ink-mute); white-space: nowrap; }
.score-pill { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--teal); background: var(--teal-soft); padding: 3px 10px; border-radius: 5px; }

/* Card */
.question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; }

/* Image */
.img-wrap { margin-bottom: 20px; }
.img-skeleton { width: 100%; height: 180px; border-radius: 10px; background: linear-gradient(90deg, var(--border) 25%, var(--surface2) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; display: flex; align-items: center; justify-content: center; }
.img-skeleton::after { content: 'Loading strip…'; color: var(--ink-mute); font-size: 13px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.strip-img { max-width: 100%; max-height: 200px; border-radius: 10px; border: 1px solid var(--border); display: none; transition: opacity 0.3s; margin: 0 auto; display: none; }

/* Step dots */
.step-dots { display: flex; justify-content: center; gap: 8px; margin: 14px 0; }
.step-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); border: 1.5px solid var(--border-strong); transition: all 0.3s; }
.step-dot.active { background: var(--teal); border-color: var(--teal); }
.step-dot.done { background: var(--correct); border-color: var(--correct); }

/* Step area */
.step-area { position: relative; min-height: 200px; }
.step-slide { }
.step-stem { font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 16px; line-height: 1.5; }
.step-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--teal); display: block; margin-bottom: 6px; }

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt { display: flex; align-items: flex-start; gap: 13px; padding: 14px 16px; border: 1px solid var(--border-strong); border-radius: 9px; cursor: pointer; background: var(--surface2); transition: all 0.12s; text-align: left; width: 100%; font-family: 'DM Sans', sans-serif; }
.opt:hover:not([disabled]) { border-color: var(--teal); background: var(--teal-soft); }
.opt-letter { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--ink-mute); min-width: 20px; font-weight: 600; margin-top: 1px; }
.opt-text { font-size: 16px; color: var(--ink); line-height: 1.5; }
.opt[disabled] { cursor: default; }
.opt.correct { border-color: var(--correct); background: var(--correct-soft); }
.opt.correct .opt-letter, .opt.correct .opt-text { color: var(--correct); font-weight: 600; }
.opt.wrong { border-color: var(--wrong); background: var(--wrong-soft); }
.opt.wrong .opt-letter, .opt.wrong .opt-text { color: var(--wrong); }
.opt.dimmed { opacity: 0.4; }

/* Shake */
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
.opt.shake { animation: shake 0.35s ease; }
@keyframes pulse-correct { 0%{transform:scale(1)} 40%{transform:scale(1.02)} 100%{transform:scale(1)} }
.opt.correct { animation: pulse-correct 0.3s ease; }

/* Try again */
.try-again { text-align: center; font-size: 13px; font-weight: 600; color: var(--wrong); padding: 8px 0 2px; border-top: 1px solid var(--border); margin-top: 8px; animation: fadeInUp 0.2s ease; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

/* Rationale */
.rationale { margin-top: 14px; padding: 14px 16px; border-radius: 9px; font-size: 15px; line-height: 1.7; border-left: 3px solid; max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.4s ease, opacity 0.3s ease, padding 0.3s ease; }
.rationale.show { max-height: 200px; opacity: 1; padding: 14px 16px; }
.rationale.correct { background: var(--correct-soft); border-color: var(--correct); color: #1a4d30; }
.rationale.wrong { background: var(--wrong-soft); border-color: var(--wrong); color: #7a2a18; }
.verdict { font-weight: 700; display: block; margin-bottom: 6px; }

/* Slide transitions */
@keyframes slideInRight { from{opacity:0;transform:translateX(50px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideInLeft  { from{opacity:0;transform:translateX(-50px)} to{opacity:1;transform:translateX(0)} }
.slide-in-right { animation: slideInRight 0.3s ease forwards; }
.slide-in-left  { animation: slideInLeft  0.3s ease forwards; }

/* Next button */
.next-btn { display: block; width: 100%; margin-top: 18px; padding: 14px; background: var(--teal); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
.next-btn:hover { background: var(--teal-soft); color: var(--teal); }

/* Results */
.results-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 36px 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
.score-big { font-family: 'Fraunces', serif; font-size: 5rem; font-weight: 600; line-height: 1; margin-bottom: 8px; }
.score-big.pass { color: var(--correct); }
.score-big.fail { color: var(--wrong); }
.score-sub { font-size: 16px; color: var(--ink-soft); margin-bottom: 8px; }
.score-msg { font-size: 16px; color: var(--ink-mute); margin-bottom: 24px; }
.results-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.r-tab { font-size: 14px; padding: 8px 18px; border: 1px solid var(--border-strong); border-radius: 7px; background: var(--surface2); color: var(--ink-soft); cursor: pointer; transition: all 0.12s; font-family: 'DM Sans', sans-serif; }
.r-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.review-item { padding: 18px 0; border-bottom: 1px solid var(--border); }
.review-item:last-child { border-bottom: none; }
.ri-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ri-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-mute); }
.ri-badge { font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 4px; }
.ri-badge.correct { background: var(--correct-soft); color: var(--correct); }
.ri-badge.wrong { background: var(--wrong-soft); color: var(--wrong); }
.ri-strip-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--teal); background: var(--teal-soft); padding: 2px 8px; border-radius: 4px; }
.ri-q { font-size: 15px; color: var(--ink); margin-bottom: 6px; font-weight: 500; }
.ri-ans { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; font-size: 14px; }
.ri-yours { color: var(--wrong); }
.ri-correct-ans { color: var(--correct); font-weight: 600; }
.ri-rationale { font-size: 14px; color: var(--ink-soft); line-height: 1.6; background: var(--surface2); padding: 10px 13px; border-radius: 7px; }
.results-actions { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
.action-btn { padding: 13px 24px; border-radius: 9px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.action-btn.primary { background: var(--teal); color: #fff; border: none; }
.action-btn.primary:hover { background: var(--teal-soft); color: var(--teal); }
.action-btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--border-strong); }
.action-btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
.empty-msg { color: var(--ink-mute); font-size: 15px; padding: 16px 0; }
</style>
</head>

    label: 'Strip 9',
    parts: [
      { stem: 'What is the heart rate?', options: ['Indeterminate — no organized R waves identifiable', 'Less than 60 bpm', '60–100 bpm', 'Greater than 150 bpm'], correct: 0, rationale: 'In ventricular fibrillation there are no organized QRS complexes or identifiable R waves. The rate cannot be calculated — the ventricles are quivering chaotically.' },
      { stem: 'Is the rhythm regular or irregular?', options: ['Completely chaotic — no discernible pattern of any kind', 'Regular', 'Regularly irregular', 'Irregularly irregular but with identifiable complexes'], correct: 0, rationale: 'Ventricular fibrillation has a completely chaotic baseline with no organized rhythm. This is a lethal dysrhythmia.' },
      { stem: 'Are P waves present before every QRS?', options: ['No — no P waves, no QRS complexes, only chaotic electrical activity', 'Yes — upright P waves before each complex', 'Sawtooth flutter waves at a rapid rate', 'P waves visible but not followed by QRS complexes'], correct: 0, rationale: 'Ventricular fibrillation has no P waves, no QRS complexes, no T waves — only disorganized chaotic activity.' },
      { stem: 'What does the QRS complex look like?', options: ['No identifiable QRS complexes — only chaotic waveforms', 'Narrow and normal at a fast rate', 'Wide and bizarre at a fast rate', 'Twisting around the baseline in a spindle pattern'], correct: 0, rationale: 'There are no identifiable QRS complexes in ventricular fibrillation — no effective ventricular contraction occurs.' },
      { stem: 'Based on your analysis, what is this rhythm?', options: ['Ventricular Fibrillation — immediate unsynchronized defibrillation required', 'Asystole — cardiopulmonary resuscitation (CPR) only, defibrillation not indicated', 'Ventricular Tachycardia — synchronized cardioversion', 'Atrial Fibrillation — rate control with IV beta blocker'], correct: 0, rationale: 'Chaotic baseline, no rate, no P waves, no QRS, pulseless — Ventricular Fibrillation. Immediate unsynchronized defibrillation. Every second without it reduces survival.' }
    ]
  }
];

// ── Engine ──────────────────────────────────────────────────────────
const KEY = 'ms2_e1_ekg';
const PASS = 77;
const LETTERS = ['A','B','C','D'];
const STEP_LABELS = ['Step 1 — Rate', 'Step 2 — Rhythm', 'Step 3 — P Waves', 'Step 4 — QRS', 'Step 5 — Identify'];

let deck = [];
let stripIdx = 0;
let stepIdx = 0;
let totalAnswered = 0;
let totalCorrect = 0;
let results = [];
let activeTab = 'full';

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildDeck() {
  deck = shuffle(STRIPS).map(strip => ({
    ...strip,
    parts: strip.parts.map(p => ({
      ...p,
      opts: p.options.map((text, i) => ({ text, isCorrect: i === p.correct }))
    }))
  }));
}

function startQuiz() {
  buildDeck();
  stripIdx = 0; stepIdx = 0;
  totalAnswered = 0; totalCorrect = 0;
  results = [];
  renderStrip();
}

function updateDots(si, currentStep) {
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) continue;
    dot.className = 'step-dot';
    if (i < currentStep) dot.classList.add('done');
    else if (i === currentStep) dot.classList.add('active');
  }
}

function renderStrip() {
  stepIdx = 0;
  const strip = deck[stripIdx];
  const area = document.getElementById('quiz-area');
  const pct = Math.round((stripIdx / deck.length) * 100);
  const scoreText = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) + '%' : '—';

  const dotsHTML = Array.from({length: 5}, (_, i) =>
    `<div class="step-dot${i === 0 ? ' active' : ''}" id="dot-${i}"></div>`
  ).join('');

  area.innerHTML = `
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${stripIdx + 1} / ${deck.length}</span>
      <span class="score-pill">${scoreText}</span>
    </div>
    <div class="question-card">
      <div class="img-wrap">
        <div class="img-skeleton" id="img-skel"></div>
        <img id="strip-img" class="strip-img" src="images/${strip.file}" alt="EKG Strip"
          onload="this.style.display='block';this.style.opacity=0;document.getElementById('img-skel').style.display='none';setTimeout(()=>{document.getElementById('strip-img').style.opacity=1;},10);"
          onerror="document.getElementById('img-skel').textContent='Image not found';" />
      </div>
      <div class="step-dots">${dotsHTML}</div>
      <div class="step-area" id="step-area"></div>
    </div>`;

  renderStep('in-right');
}

function renderStep(animClass) {
  const strip = deck[stripIdx];
  const part = strip.parts[stepIdx];
  const area = document.getElementById('step-area');
  if (!area) return;

  const optsHTML = part.opts.map((o, i) => `
    <button class="opt" onclick="pickAnswer(${i})">
      <span class="opt-letter">${LETTERS[i]}</span>
      <span class="opt-text">${o.text}</span>
    </button>`).join('');

  area.innerHTML = `
    <div class="${animClass}" id="step-slide">
      <span class="step-label">${STEP_LABELS[stepIdx]}</span>
      <div class="step-stem">${part.stem}</div>
      <div class="options" id="opts">${optsHTML}</div>
      <div id="try-again" style="display:none" class="try-again"></div>
      <div class="rationale" id="rationale"></div>
    </div>`;
}

function pickAnswer(chosenI) {
  const strip = deck[stripIdx];
  const part = strip.parts[stepIdx];
  const correctI = part.opts.findIndex(o => o.isCorrect);
  const isCorrect = chosenI === correctI;

  if (!isCorrect) {
    const btn = document.querySelectorAll('.opt')[chosenI];
    btn.classList.remove('shake'); void btn.offsetWidth; btn.classList.add('shake');
    btn.addEventListener('animationend', () => btn.classList.remove('shake'), { once: true });
    btn.style.background = 'var(--wrong-soft)';
    setTimeout(() => { btn.style.background = ''; }, 600);
    const ta = document.getElementById('try-again');
    ta.textContent = '✗ Not quite — try again';
    ta.style.display = 'block';
    ta.classList.remove('try-again'); void ta.offsetWidth; ta.classList.add('try-again');
    setTimeout(() => { ta.style.display = 'none'; }, 2000);
    return;
  }

  // Correct
  document.querySelectorAll('.opt').forEach((b, i) => {
    b.setAttribute('disabled', 'true');
    if (i === correctI) b.classList.add('correct');
    else b.classList.add('dimmed');
  });

  totalAnswered++;
  totalCorrect++;

  results.push({
    stripLabel: strip.label,
    stepLabel: STEP_LABELS[stepIdx],
    stem: part.stem,
    yourLetter: LETTERS[chosenI],
    yourText: part.opts[chosenI].text,
    correctLetter: LETTERS[correctI],
    correctText: part.opts[correctI].text,
    isCorrect: true,
    rationale: part.rationale
  });

  const rat = document.getElementById('rationale');
  rat.textContent = part.rationale;
  rat.classList.add('correct');
  requestAnimationFrame(() => requestAnimationFrame(() => rat.classList.add('show')));

  updateDots(stripIdx, stepIdx + 1);

  const isLastStep = stepIdx === strip.parts.length - 1;
  const isLastStrip = stripIdx === deck.length - 1;

  if (!isLastStep) {
    setTimeout(() => {
      stepIdx++;
      // Slide current out left, new in from right
      const slide = document.getElementById('step-slide');
      slide.style.transition = 'opacity 0.2s, transform 0.2s';
      slide.style.opacity = '0';
      slide.style.transform = 'translateX(-40px)';
      setTimeout(() => renderStep('slide-in-right'), 220);
    }, 600);
  } else {
    // Last step — show next strip button
    setTimeout(() => {
      const area = document.getElementById('step-area');
      const btn = document.createElement('button');
      btn.className = 'next-btn';
      btn.textContent = isLastStrip ? 'See results →' : 'Next strip →';
      btn.onclick = isLastStrip ? showResults : nextStrip;
      area.appendChild(btn);
    }, 700);
  }
}

function nextStrip() {
  stripIdx++;
  const card = document.querySelector('.question-card');
  card.style.transition = 'opacity 0.25s, transform 0.25s';
  card.style.opacity = '0';
  card.style.transform = 'translateX(-40px)';
  setTimeout(() => {
    renderStrip();
    const newCard = document.querySelector('.question-card');
    if (newCard) {
      newCard.style.opacity = '0';
      newCard.style.transform = 'translateX(40px)';
      newCard.style.transition = 'opacity 0.3s, transform 0.3s';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        newCard.style.opacity = '1';
        newCard.style.transform = 'translateX(0)';
      }));
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 270);
}

function showResults() {
  const pct = Math.round((totalCorrect / totalAnswered) * 100);
  const pass = pct >= PASS;
  try {
    const prev = parseInt(localStorage.getItem(KEY + '_best') || '0', 10);
    if (pct > prev) localStorage.setItem(KEY + '_best', String(pct));
    localStorage.setItem(KEY + '_last', String(pct));
  } catch(e) {}

  const msg = pct >= 90 ? 'Sharp — EKG interpretation is yours.'
    : pct >= PASS ? 'Passing. Review the ones you missed and you\'ll nail these on exam day.'
    : 'Below passing — go back through the rationales and retake.';

  document.getElementById('quiz-area').innerHTML = `
    <div class="results-card">
      <div class="score-big ${pass ? 'pass' : 'fail'}">${pct}%</div>
      <div class="score-sub">${totalCorrect} / ${totalAnswered} correct · EKG Interpreter</div>
      <div class="score-msg">${msg}</div>
      <div class="results-tabs">
        <button class="r-tab ${activeTab==='full'?'active':''}" onclick="setTab('full',this)">Full Review</button>
        <button class="r-tab ${activeTab==='missed'?'active':''}" onclick="setTab('missed',this)">Missed Only</button>
      </div>
      <div id="review-list"></div>
      <div class="results-actions">
        <button class="action-btn primary" onclick="startQuiz()">Retake</button>
        <a class="action-btn ghost" href="index.html">Back to hub</a>
      </div>
    </div>`;
  renderReview();
}

function setTab(t, el) {
  activeTab = t;
  document.querySelectorAll('.r-tab').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderReview();
}

function renderReview() {
  const list = document.getElementById('review-list');
  let items = results.map((r, i) => ({ ...r, n: i + 1 }));
  if (activeTab === 'missed') items = items.filter(r => !r.isCorrect);
  if (!items.length) {
    list.innerHTML = `<div class="empty-msg">${activeTab === 'missed' ? '✓ No missed questions — perfect score!' : 'Nothing here.'}</div>`;
    return;
  }
  list.innerHTML = items.map(r => `
    <div class="review-item">
      <div class="ri-meta">
        <span class="ri-num">Q${r.n}</span>
        <span class="ri-strip-label">${r.stripLabel}</span>
        <span class="ri-badge ${r.isCorrect ? 'correct' : 'wrong'}">${r.isCorrect ? '✓ Correct' : '✗ Missed'}</span>
        <span style="font-size:12px;color:var(--ink-mute)">${r.stepLabel}</span>
      </div>
      <div class="ri-q">${r.stem}</div>
      <div class="ri-ans">
        ${r.isCorrect
          ? `<span class="ri-correct-ans">${r.yourLetter} — ${r.yourText} ✓</span>`
          : `<span class="ri-yours">You chose: ${r.yourLetter} — ${r.yourText}</span>
             <span class="ri-correct-ans">Correct: ${r.correctLetter} — ${r.correctText}</span>`}
      </div>
      <div class="ri-rationale">${r.rationale}</div>
    </div>`).join('');
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startQuiz);
else startQuiz();
</script>
